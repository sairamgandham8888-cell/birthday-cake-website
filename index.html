<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Blow the candle · birthday magic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f44 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px #f9d77e inset;
            padding: 30px 30px 50px;
            max-width: 700px;
            width: 100%;
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffe5b4;
            text-shadow: 0 4px 0 #9b6b43, 0 6px 10px black;
            font-size: 2rem;
            word-break: break-word;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        /* cake container */
        .cake-stage {
            background: #4a6b7f;
            background-image: radial-gradient(circle at 30% 40%, #608094 2px, transparent 2px),
                              radial-gradient(circle at 70% 70%, #3f5e72 3px, transparent 3px);
            border-radius: 100px 100px 40px 40px;
            padding: 30px 20px 30px;
            box-shadow: inset 0 -10px 0 #2c4453, 0 10px 0 #0e212b;
        }

        .plate {
            background: #e8d2b0;
            height: 28px;
            width: 90%;
            margin: 0 auto -10px;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 8px 0 #b2926a, 0 12px 10px rgba(0,0,0,0.3);
        }

        /* the cake layers */
        .cake {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 5px;
        }

        .layer {
            width: 80%;
            background: #f9b996;
            border-radius: 30px 30px 10px 10px;
            box-shadow: 0 8px 0 #b46b3f, 0 12px 8px rgba(0,0,0,0.2);
            margin: 0 auto 15px;
            padding: 25px 0 5px;
            position: relative;
        }

        .layer.bottom {
            background: #f9a67a;
            width: 94%;
            padding: 30px 0 10px;
        }

        .layer.middle {
            background: #fdbe8f;
            width: 88%;
            padding: 28px 0 8px;
        }

        .layer.top {
            background: #ffd7a5;
            width: 80%;
            padding: 22px 0 10px;
            box-shadow: 0 6px 0 #b46b3f, 0 10px 8px rgba(0,0,0,0.2);
            margin-bottom: 5px;
        }

        /* drip effect (simple) */
        .drip {
            background: #ffefcf;
            height: 12px;
            width: 20px;
            border-radius: 50%;
            position: absolute;
            bottom: -6px;
            left: 30%;
            box-shadow: 0 4px 0 #b46b3f;
        }

        .drip.two {
            left: 60%;
            width: 28px;
        }

        /* candles row */
        .candles-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 5px 0 15px;
            flex-wrap: wrap;
            pointer-events: none;
        }

        .candle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 8px 4px #00000055);
            transition: opacity 0.2s ease;
        }

        .candle {
            width: 22px;
            height: 90px;
            background: linear-gradient(145deg, #f5e9d8, #ffb6c1);
            background: #fcd7b0;         /* creamy candle */
            border-radius: 12px 12px 6px 6px;
            border: 2px solid #ffebcc;
            box-shadow: -2px -2px 4px #fff2d7 inset, 3px 5px 8px #9f6e4b inset;
            position: relative;
            margin-bottom: -8px;
        }

        /* flame (always present, hidden by blowing will be done via opacity) */
        .flame {
            width: 20px;
            height: 32px;
            background: radial-gradient(circle at 50% 20%, #fff9b0, #ff8c00 70%, #b14300);
            border-radius: 60% 60% 30% 30%;
            transform: rotate(-5deg) scale(1.2);
            box-shadow: 0 -8px 20px #ffae42, 0 0 30px #ffd966;
            margin-top: -16px;
            transition: opacity 0.2s ease, transform 0.2s;
            animation: flicker 0.15s infinite alternate;
            transform-origin: bottom;
            position: relative;
            z-index: 5;
        }

        /* flame flicker */
        @keyframes flicker {
            0% { transform: rotate(-3deg) scale(1.2); opacity: 0.95; }
            100% { transform: rotate(3deg) scale(1.3); opacity: 1; }
        }

        /* hidden state for blown candle */
        .candle-wrapper.blown .flame {
            opacity: 0 !important;
            animation: none;
            box-shadow: none;
            pointer-events: none;
        }

        /* smoke effect when blown (appears briefly then fades) */
        .candle-wrapper.blown .smoke-puff {
            display: block;
            animation: puff 0.5s ease-out forwards;
        }

        .smoke-puff {
            display: none;
            width: 30px;
            height: 20px;
            background: rgba(220, 220, 240, 0.5);
            border-radius: 60%;
            filter: blur(10px);
            position: absolute;
            top: -10px;
            left: -5px;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes puff {
            0% { opacity: 0.8; transform: translate(0, 0) scale(0.5); }
            100% { opacity: 0; transform: translate(10px, -30px) scale(2); }
        }

        /* icing / decorations */
        .sprinkles {
            font-size: 24px;
            letter-spacing: 10px;
            text-align: center;
            color: #fffaec;
            text-shadow: 2px 2px 0 #b95b2d;
            line-height: 0.5;
        }

        .message-area {
            background: #eeddbb;
            border-radius: 40px 40px 20px 20px;
            padding: 28px 20px;
            margin: 30px 0 0;
            font-size: 2.6rem;
            font-weight: bold;
            text-align: center;
            color: #bc2c6f;
            text-shadow: 2px 2px 0 #ffc9c9;
            box-shadow: inset 0 -5px 0 #b2926a, 0 8px 0 #7a5837;
            transition: all 0.3s;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        .birthday-message {
            transform: scale(1);
            color: #a3204b;
            background: #fcf0d5;
            padding: 0 12px;
            border-radius: 60px;
            line-height: 1.4;
        }

        .small-note {
            color: #cedfec;
            text-align: center;
            margin: 20px 0 0;
            font-size: 1.2rem;
            background: #00000040;
            padding: 10px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .microphone-permission {
            font-size: 1rem;
            background: #8b0000b0;
            color: #ffd6d6;
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
        }

        .blow-hint {
            background: #fa0;
            color: black;
            font-weight: bold;
            padding: 4px 16px;
            border-radius: 60px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎈 HAPPY BIRTHDAY 🎈</h1>

    <div class="cake-stage">
        <div class="cake">
            <!-- candles (three flames) -->
            <div class="candles-row" id="candlesRow">
                <!-- candle 1 -->
                <div class="candle-wrapper" id="candle1">
                    <div class="flame"></div>
                    <div class="smoke-puff"></div>
                    <div class="candle"></div>
                </div>
                <!-- candle 2 -->
                <div class="candle-wrapper" id="candle2">
                    <div class="flame"></div>
                    <div class="smoke-puff"></div>
                    <div class="candle"></div>
                </div>
                <!-- candle 3 (maybe extra fun) -->
                <div class="candle-wrapper" id="candle3">
                    <div class="flame"></div>
                    <div class="smoke-puff"></div>
                    <div class="candle"></div>
                </div>
            </div>

            <!-- cake layers -->
            <div class="layer top">
                <div class="sprinkles">✦ • ✦</div>
            </div>
            <div class="layer middle">
                <div class="drip"></div>
                <div class="drip two"></div>
            </div>
            <div class="layer bottom"></div>
        </div>
        <div class="plate"></div>
    </div>

    <!-- message appears here after all candles blown -->
    <div class="message-area" id="birthdayMessage">
        🕯️ blow out the candles 🕯️
    </div>

    <div class="small-note">
        <span id="micStatus">🎤 need mic access — click 'start listening'</span>
        <br>
        <button id="requestMicBtn" style="font-size: 1.2rem; padding: 8px 30px; margin: 12px 0; background: #ffd966; border: none; border-radius: 40px; font-weight: bold; box-shadow: 0 4px 0 #b46b3f; cursor: pointer;">🔥 start listening 🔥</button>
        <div id="blowDebug" style="font-size: 1rem; color: #b0e0ff;"></div>
    </div>
</div>

<script>
    (function() {
        // Candle elements
        const candle1 = document.getElementById('candle1');
        const candle2 = document.getElementById('candle2');
        const candle3 = document.getElementById('candle3');
        const candles = [candle1, candle2, candle3];
        const messageDiv = document.getElementById('birthdayMessage');
        const micStatus = document.getElementById('micStatus');
        const blowDebug = document.getElementById('blowDebug');
        const requestBtn = document.getElementById('requestMicBtn');

        // State
        let blownState = [false, false, false];   // track each candle blown
        let audioContext = null;
        let analyser = null;
        let mediaStream = null;
        let isMicActive = false;
        let animationFrame = null;

        // Sensitivity threshold (adjust if too sensitive / not enough)
        const BLOW_THRESHOLD = 0.18;      // typical blow ~0.2–0.4
        const MIN_VOLUME_TO_TRIGGER = 0.12; // ignore tiny noises

        // Helper: check if all candles blown, update message
        function updateBirthdayMessage() {
            if (blownState.every(v => v === true)) {
                messageDiv.innerHTML = '<span class="birthday-message">🎉 HAPPY BIRTHDAY TO YOU! 🎉<br>🥳 WISH COMES TRUE! 🥳</span>';
            } else {
                // count how many remain
                const remaining = blownState.filter(v => !v).length;
                if (remaining === 0) return; // already set
                messageDiv.innerHTML = `🎂 blow ${remaining} more ${remaining === 1 ? 'candle' : 'candles'}... 🎂`;
            }
        }

        // Mark a specific candle as blown (if not already)
        function blowCandle(index) {
            if (index < 0 || index >= candles.length) return;
            if (!blownState[index]) {
                blownState[index] = true;
                candles[index].classList.add('blown');
                updateBirthdayMessage();
                blowDebug.innerText = `💨 candle ${index+1} blown!`;
                // optional: tiny vibration effect if supported (just for fun)
                if (navigator.vibrate) navigator.vibrate(30);
            }
        }

        // reset candles (useful for restart, but we also allow reload)
        function resetAllCandles() {
            blownState = [false, false, false];
            candles.forEach(c => c.classList.remove('blown'));
            messageDiv.innerHTML = '🕯️ blow out the candles 🕯️';
            blowDebug.innerText = 'reset — blow again!';
        }

        // Analyse microphone volume
        function detectBlow() {
            if (!analyser || !isMicActive) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray); // get volume data

            // compute average volume (0-255)
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let avg = sum / dataArray.length; // 0..255
            let normalized = avg / 255;        // 0..1

            // debug display (optional)
            // blowDebug.innerText = `volume: ${normalized.toFixed(2)}`;

            // threshold check
            if (normalized > BLOW_THRESHOLD) {
                // Blow detected! find first unblown candle and blow it
                let blownAny = false;
                for (let i = 0; i < blownState.length; i++) {
                    if (!blownState[i]) {
                        blowCandle(i);
                        blownAny = true;
                        break;      // only blow one per detection (prevents instant all)
                    }
                }
                if (blownAny) {
                    // small pause to avoid multiple triggers in same blow
                    // but we keep analysing – we add a small cooldown inside same blow?
                    // we'll use a short cooldown flag to prevent machine-gun
                    if (!window.blowCooldown) {
                        window.blowCooldown = true;
                        setTimeout(() => { window.blowCooldown = false; }, 300);
                    }
                }
            }

            // continue monitoring
            animationFrame = requestAnimationFrame(detectBlow);
        }

        // Clean up microphone and animation
        function stopMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close().catch(console.warn);
                audioContext = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            analyser = null;
            isMicActive = false;
            micStatus.innerHTML = '🎤 microphone stopped — click start';
        }

        // Start microphone & analyser
        async function startMicrophone() {
            if (isMicActive) {
                // already running? stop then restart (clean)
                stopMicrophone();
                // but reset UI maybe
                resetAllCandles();
            }

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                micStatus.innerHTML = '✅ microphone access granted — blow now!';
                micStatus.style.background = '#1f6d1fb0';

                // Set up Web Audio API
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;

                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
                // (optionally connect to destination if you want to hear yourself — not needed)
                // source.connect(audioContext.destination);  // would create echo

                isMicActive = true;

                // start detection loop if context is running
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                // Reset any leftover cooldown flag
                window.blowCooldown = false;

                // ensure all candles are ready for new session
                resetAllCandles();

                // begin monitoring
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(detectBlow);

            } catch (err) {
                console.error('Mic error:', err);
                micStatus.innerHTML = '❌ microphone denied or not available';
                micStatus.style.background = '#8b0000b0';
                isMicActive = false;
            }
        }

        // attach button click
        requestBtn.addEventListener('click', () => {
            startMicrophone().catch(e => {
                blowDebug.innerText = 'mic error: ' + e.message;
            });
        });

        // Also allow reset via double-click on cake (fun)
        document.querySelector('.cake-stage').addEventListener('dblclick', () => {
            if (isMicActive) {
                resetAllCandles();
                blowDebug.innerText = '✨ manual reset ✨';
            } else {
                alert('please start microphone first');
            }
        });

        // initial UI
        updateBirthdayMessage();

        // if user leaves page, stop mic (clean)
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
        });

        // we already integrated a cooldown in detectBlow with 'blowCooldown'
        // but also we want to ignore if all are blown
        // we will modify detectBlow to respect cooldown and only blow unblown
        // (already done)

        // patch detectBlow to use cooldown properly
        // preserve original detectBlow and override with cooldown

            if (!analyser || !isMicActive) return;

            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / dataArray.length;
            let normalized = avg / 255;

            // show volume in debug (optional)
            // blowDebug.innerText = `vol: ${normalized.toFixed(2)}`;

            if (normalized > BLOW_THRESHOLD && !window.blowCooldown) {
                // check if any unblown candle left
                if (!blownState.every(v => v)) {
                    window.blowCooldown = true;
                    // blow one candle that's not blown (first)
                    for (let i = 0; i < blownState.length; i++) {
                        if (!blownState[i]) {
                            blowCandle(i);
                            break;
                        }
                    }
